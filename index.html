<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WorldCup</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="app"></div>

  <script type="module">
    import { Navbar } from "./components/navbar.js";
    import { Hero } from "./components/hero.js";
    import { Matches } from "./components/matches.js";
    import { Leaderboard } from "./components/leaderboard.js";

    const app = document.getElementById("app");

    // 🔥 SIMPLE LIVE STATE
    let state = {
      matches: [],
      teams: []
    };

    // 🧠 RENDER FUNCTION (CENTRAL SYSTEM)
    function render() {
      app.innerHTML = `
        ${Navbar()}
        ${Hero()}
        ${Matches(state.matches)}
        ${Leaderboard(state.teams)}
      `;
    }

    // 🚀 INITIAL RENDER
    render();

    // 🔄 AUTO UPDATE SYSTEM (REALISTIC MOCK FOR NOW)
    async function loadData() {
      try {
        // Later replace with real API (OpenFootball / Supabase)
        const res = await fetch("./data/mock.json");
        const data = await res.json();

        state.matches = data.matches || [];
        state.teams = data.teams || [];

        render();

      } catch (err) {
        console.log("Data load error:", err);
      }
    }

    // FIRST LOAD
    loadData();

    // AUTO REFRESH (LIVE SYSTEM)
    setInterval(loadData, 5000);

  </script>

</body>
</html>
